# Parameters for Sonarr
sonarr_url:
sonarr_api_key:
sonarr_ignore_unmonitored: false  # If True, will not grab releases that are unmonitored in Sonarr
ignore_movies_in_radarr: false  # If True, will not add movies to Sonarr that already exist in Radarr

# Parameters for Radarr
radarr_url:
radarr_api_key:
radarr_ignore_unmonitored: false  # If True, will not grab releases that are unmonitored in Radarr

# qBittorrent parameters
qbit_info:
  host:
  username:
  password:

# Categories for added torrents
sonarr_torrent_category:
radarr_torrent_category:
torrent_tags:

# Local SeaDex mirror — keep a local SQLite copy of the SeaDex catalogue and
# read entries from it instead of querying the API once per title every run.
# Refreshes incrementally (only entries changed since the last sync), so steady
# runs cost ~one request. Set false to query the live API per title instead.
seadex_mirror: true
seadex_mirror_db:  # defaults to seadex_mirror.db beside the cache file

# Ignore SeaDex update times?
ignore_seadex_update_times: false

# Do you want to filter purely by torrent hash?
use_torrent_hash_to_filter: false

# Maximum number of torrents to add in one run
max_torrents_to_add:

# Discord webhook URL
discord_url:

# SeaDex filters
public_only: true
prefer_dual_audio: true
want_best: true
ignore_tags:
trackers:

# Advanced settings
sleep_time: 2
cache_time: 1
sonarr_parse_workers: 8  # Concurrent Sonarr /parse calls when parsing SeaDex filenames
interactive: false
anime_mappings:
anidb_mappings:
anibridge_mappings:
log_level: "INFO"

# Audit mode: scan, classify, tag — never grabs torrents
audit:
  dry_run: true           # true = log only, no Sonarr mutations
  include_radarr: true    # also audit Radarr movies (needs radarr_url/radarr_api_key)
  notify_discord: true
  update_sonarr_tags: true
  remove_stale_tags: false  # only removes tags listed in audit.tags

  tags:
    full_seadex: seadex
    partial_seadex: partial-seadex
    upgrade_available: seadex-upgrade-available
    too_large: seadex-too-large
    missing_specials: seadex-missing-specials
    missing_season: seadex-missing-season
    ignored: seadex-ignored

  # If true, having any SeaDex-listed release (best OR alt) is considered
  # acceptable — series won't be flagged for upgrade just because a "best"
  # release exists when you already have an "alt" one.
  alt_is_acceptable: false

  size_filters:
    enabled: true
    max_absolute_gb: 80
    max_size_multiplier: 2.0
    tag_when_too_large: true

  discord:
    notify_on_new_seadex_match: true
    notify_on_new_upgrade_available: true
    notify_on_partial_match: true
    notify_on_too_large: true
    notify_on_missing_specials: true
    notify_on_missing_season: true
    notify_on_state_change: true   # any other state change (e.g. SeaDex release list updated)
    notify_on_no_change: false
    batch_notifications: true

  state:
    enabled: true
    path:    # defaults to /config/audit_state.json if blank
